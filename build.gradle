buildscript {
    ext {
        springBootVersion = '2.4.2'
        springBootAliyunVersion = '1.0.0'
        springCloudVersion = '2020.0.0'
        springCloudAlibabaVersion = '2021.1'
        mapStructVersion = '1.4.2.Final'
        knife4jVersion = '3.0.3'
    }

    repositories {
        maven { url 'https://maven.aliyun.com/repository/public' }
        mavenCentral()
    }

    dependencies {
        classpath("org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}")
    }
}

allprojects {
    group = 'com.tsengfhy.elaphure'
    version = '2.4.0-SNAPSHOT'
}

subprojects {
    apply plugin: 'org.springframework.boot'
    apply plugin: 'io.spring.dependency-management'
    apply plugin: 'java-library'
    apply plugin: 'idea'

    sourceCompatibility = JavaVersion.VERSION_11
    targetCompatibility = JavaVersion.VERSION_11

    repositories {
        maven { url 'https://maven.aliyun.com/repository/public' }
        mavenCentral()
    }

    dependencies {
        compileOnly 'org.springframework.boot:spring-boot-starter'
        testImplementation 'org.springframework.boot:spring-boot-starter-test'
        compileOnly "org.projectlombok:lombok"
        annotationProcessor "org.projectlombok:lombok"
        testCompileOnly "org.projectlombok:lombok"
        testAnnotationProcessor "org.projectlombok:lombok"
        implementation 'org.mapstruct:mapstruct'
        annotationProcessor 'org.mapstruct:mapstruct-processor'
        testAnnotationProcessor 'org.mapstruct:mapstruct-processor'
    }

    dependencyManagement {
        imports {
            mavenBom "com.alibaba.cloud:aliyun-spring-boot-dependencies:${springBootAliyunVersion}"
            mavenBom "org.springframework.cloud:spring-cloud-dependencies:${springCloudVersion}"
            mavenBom "com.alibaba.cloud:spring-cloud-alibaba-dependencies:${springCloudAlibabaVersion}"
            mavenBom "com.github.xiaoymin:knife4j-dependencies:${knife4jVersion}"
        }

        dependencies {
            dependency "org.mapstruct:mapstruct:${mapStructVersion}"
            dependency "org.mapstruct:mapstruct-processor:${mapStructVersion}"
        }
    }

    test {
        useJUnitPlatform()
    }

    tasks.withType(JavaCompile) {
        options.encoding = 'UTF-8'
    }

    jar.enabled = true
    bootJar.enabled = false
}
